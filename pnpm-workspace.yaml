packages:
  - .
  - test/typescript-v7

allowBuilds:
  core-js: false
  simple-git-hooks: false
minimumReleaseAgeExclude:
  - '@rsbuild/*'
  - '@rslib/*'
  - '@rslint/*'
  - '@rspack/*'
  - '@rspress/*'
  - '@rstackjs/*'
  - '@rstest/*'
  - '@typescript/*'
  - 'rsbuild-plugin-*'
  - rstack
  - ts-checker-rspack-plugin
  - typescript
